substitutions:
  font: gfonts://Roboto
  # http://materialdesignicons.com/cdn/7.4.47/ 
  # http://materialdesignicons.com/cdn/7.4.47/fonts/materialdesignicons-webfont.ttf
  mdi: fonts/materialdesignicons-webfont.ttf 
  icon_clock: "\U000F00F0"
  icon_battery: "\U000F0079"
  icon_wifi: "\U000F05A9"
  icon_thermo_outside: "\U000F18D7"
  icon_thermo_inside: "\U000F0F55"

# Font definition
font:
  - file: ${mdi}
    id: mdi_icons
    size: 24
    glyphs: [
      "${icon_clock}",
      "${icon_wifi}",
      "${icon_thermo_inside}",
      "${icon_thermo_outside}",
      "${icon_battery}" ]
  - file: "gfonts://Roboto"
    id: theme_font_small
    size: 14
  - file: "gfonts://Roboto"
    id: theme_font_normal
    size: 20
  - file: "gfonts://Roboto"
    id: theme_font_large
    size: 28

