number:
  - platform: template
    id: screen_timeout_seconds
    name: Screen timeout delay
    unit_of_measurement: "s"
    icon: "mdi:timer-outline"
    entity_category: config
    optimistic: true
    restore_value: true
    mode: box
    min_value: 15
    max_value: 3600
    step: 5
    initial_value: 60
    set_action:
      - script.execute: reset_idle_timer

  - platform: template
    id: idle_timeout_seconds
    name: Idle timeout delay
    unit_of_measurement: "s"
    icon: "mdi:timer-outline"
    entity_category: config
    optimistic: true
    restore_value: true
    mode: box
    min_value: 1
    max_value: 60
    step: 1
    initial_value: 10
    set_action:
      - script.execute: reset_idle_timer

text:
  # This seems nice, but gets confusing since it can drift from $mediaplayer
  #- platform: template
  #  name: "Target MA Media Player Entity"
  #  id: target_media_player
  #  optimistic: true
  #  entity_category: config
  #  mode: text
  #  initial_value: "${mediaplayer}"
  #  restore_value: true

  - platform: template
    name: "Time Format"
    id: setting_time_format
    optimistic: true
    entity_category: config
    icon: "mdi:calendar-clock"
    mode: text
    initial_value: "%a %d %b\\n%H:%M:%S"
    restore_value: true
    on_value:
      - script.execute: update_time_format

  - platform: template
    name: "Favorite Playlist 1"
    id: fav_playlist_1
    optimistic: true
    entity_category: config
    icon: "mdi:playlist-music"
    mode: text
    initial_value: "My Awesome Playlist"
    restore_value: true

select:
  - platform: template
    name: "Idle Page Preference"
    id: idle_page_preference
    entity_category: config
    optimistic: true
    restore_value: true
    options:
      - "time"
      - "media"
      - "media_overlay"
    initial_option: "time"
    set_action:
      - script.execute: reset_idle_timer
    on_value:
      - logger.log:
          format: "Display preference changed to: %s"
          args: ["x.c_str()"]

switch:
  - platform: template
    name: "Display Album Art"
    id: album_art_preference
    icon: "mdi:album"
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    turn_on_action:
      - logger.log: "Artwork enabled"
    turn_off_action:
      - logger.log: "Artwork disabled"
      - script.execute:
          id: handle_media_album_art_display_placeholder
