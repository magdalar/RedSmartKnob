globals:
  # api_ready indicates if HA is currently connected
  - id: api_ready
    type: bool
    initial_value: 'false'

api:
  on_client_connected:
    - logger.log:
        format: "Client %s connected (IP: %s)"
        args: [ "client_info.c_str()", "client_address.c_str()" ]
    - wait_until:
        condition:
          api.connected:
            state_subscription_only: true
    - lambda: |-
        ESP_LOGI("startup", "Home Assistant connected.");
        id(api_ready) = true;
        id(api_connected)->execute();
  on_client_disconnected:
    - logger.log:
        format: "Client %s disconnected (IP: %s)"
        args: [ "client_info.c_str()", "client_address.c_str()" ]
    - if:
        condition:
          not:
            api.connected:
              state_subscription_only: true
        then:
          - lambda: |-
              ESP_LOGW("startup", "Home Assistant disconnected.");
              id(api_ready) = false;
              id(api_disconnected)->execute();
