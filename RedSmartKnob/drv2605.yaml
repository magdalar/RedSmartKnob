external_components:
  - source: github://RAR/esphome-drv2605
    components: [ drv2605 ]
    #refresh: 0

drv2605:
  id: haptic_driver
  motor_type: LRA
  library: 6
  address: 0x5A   # optional; overrides default

number:
  - platform: template
    name: "Haptic Intensity"
    min_value: 0
    max_value: 255
    step: 1
    initial_value: 255
    entity_category: config
    optimistic: true
    set_action:
      - drv2605.set_realtime_value:
          id: haptic_driver
          value: !lambda "return x;"

script:
  - id: haptic_pulse
    then:
      - drv2605.play_effect:
          id: haptic_driver
          effect: 7  # Soft Bump

