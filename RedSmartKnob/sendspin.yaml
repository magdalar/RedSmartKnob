# TODO: If coming from a stopped/idle state, art, position and track duration stay unknown.
# TODO: Pausing goes to on_idle immediately.

substitutions:
  output_speaker_id: output_speaker_not_configured
  sample_rate_speaker: 16000
  task_stack_in_psram: True

speaker:
  - platform: mixer
    id: mixing_speaker
    task_stack_in_psram: ${task_stack_in_psram}
    output_speaker: ${output_speaker_id}
    num_channels: 2
    source_speakers:
      - id: announcement_speaker_mixer_input
        timeout: never
      - id: media_speaker_mixer_input
        timeout: never

  - platform: resampler
    id: media_speaker_resampling_input
    task_stack_in_psram: ${task_stack_in_psram}
    output_speaker: media_speaker_mixer_input

  - platform: resampler
    id: announcement_speaker_resampling_input
    task_stack_in_psram: ${task_stack_in_psram}
    output_speaker: announcement_speaker_mixer_input

sendspin:
  id: sendspin_hub
  task_stack_in_psram: ${task_stack_in_psram}

text_sensor:
  - platform: sendspin
    id: sendspin_title
    type: title
    on_value:
      - script.execute:
          id: handle_media_track_changed
          track_name: !lambda return x;

  - platform: sendspin
    id: sendspin_artist
    type: artist
    on_value:
      - script.execute:
          id: handle_media_artist_changed
          artist_name: !lambda return x;

  - platform: sendspin
    id: sendspin_album
    type: album
    on_value:
      - script.execute:
          id: handle_media_album_changed
          album_name: !lambda return x;

sensor:
  - platform: sendspin
    type: track_progress
    id: sendspin_progress
    update_interval: 1s
    on_value:
      - lambda: |-
          float pos_secs = x / 1000.0;
          float dur_secs = id(sendspin_duration).has_state() ? id(sendspin_duration).state / 1000.0 : 0.0;
          id(handle_media_progress)->execute(pos_secs, dur_secs);

  - platform: sendspin
    type: track_duration
    id: sendspin_duration
    on_value:
      - lambda: |-
          float pos_secs = id(sendspin_progress).has_state() ? id(sendspin_progress).state / 1000.0 : 0.0;
          float dur_secs = x / 1000.0;
          id(handle_media_progress)->execute(pos_secs, dur_secs);


audio_file:

media_source:
  - platform: audio_file
    id: audio_file_announcement_source
  - platform: audio_http
    id: http_announcement_source
  - platform: audio_http
    id: http_media_source
  - platform: sendspin
    id: sendspin_media_source
    task_stack_in_psram: ${task_stack_in_psram}

globals:
  - id: sendspin_is_idle
    type: bool
    initial_value: 'false'
  - id: sendspin_volume
    type: float
    initial_value: '-1.0'

media_player:
  - platform: sendspin
    id: sendspin_group_media_player
    name: Sendspin Group Media Player
    # Prevent this from showing up in Home Assistant by default.
    # The user can still enable it, though they should use the Music Assistant
    # entity instead.
    disabled_by_default: true

  - platform: speaker_source
    name: Media Player
    id: external_media_player

    announcement_pipeline:
      speaker: announcement_speaker_mixer_input
      format: FLAC
      sample_rate: ${sample_rate_speaker}
      num_channels: 1
      sources:
        - audio_file_announcement_source
        - http_announcement_source

    media_pipeline:
      format: FLAC
      sample_rate: ${sample_rate_speaker}
      speaker: media_speaker_mixer_input
      num_channels: 2
      sources:
        - http_media_source
        - sendspin_media_source

    volume_increment: 0.05
    volume_min: 0.4
    volume_max: 0.85
    on_mute:
      - script.execute: handle_media_volume_muted
    on_unmute:
      - script.execute: handle_media_volume_unmuted
    on_volume:
      - lambda: |-
          if (abs(id(sendspin_volume) - x) >= 0.01) {
            id(sendspin_volume) = x;
            id(handle_media_volume_changed)->execute(x);
          }
    on_play:
      - lambda: 'id(sendspin_is_idle) = false;'
      - script.execute: handle_media_playing
    on_idle:
      - if:
          condition:
            lambda: 'return !id(sendspin_is_idle);'
          then:
            - lambda: 'id(sendspin_is_idle) = true;'
            - script.execute: handle_media_paused
    on_pause:
      - script.execute: handle_media_paused
    on_announcement:
      - script.execute: handle_media_announcement

script:
  # This is called by actions_media.yaml on_boot to apply preference_media_player_entity
  - id: set_mediaplayer_entity_id
    parameters:
      new_media_player_id: std::string
    then:
      lambda: |-
        // We need to cache it for the lifetime of the process, as set_entity_id takes the ptr.
        // This can only be called once on_boot, so this should be safe.
        static const std::string new_entity = new_media_player_id;
        ESP_LOGI("sendspin", "[No-op] Updating media player entity: %s", new_entity.c_str());

  - id: set_media_volume
    parameters:
        new_vol: float
    then:
      - media_player.volume_set:
          id: sendspin_group_media_player
          volume: !lambda 'return new_vol;'

  - id: set_media_volume_mute
    then:
      - media_player.mute:
          id: sendspin_group_media_player

  - id: set_media_volume_unmute
    then:
      - media_player.unmute:
          id: sendspin_group_media_player

  - id: set_media_play_pause
    then:
      - media_player.toggle:
          id: sendspin_group_media_player

  - id: set_media_next
    then:
      - media_player.next:
          id: sendspin_group_media_player

  - id: set_media_previous
    then:
      - media_player.previous:
          id: sendspin_group_media_player

