substitutions:
  ### These are not user-configurable.
  imagewidth: 120
  imageheight: 120
  screenwidth: 360
  screenheight: 360

  # Where to pull image files from.
  # Override this in the outer layer to "./RedSmartKnob" to use local files.
  repo_base_uri: "https://raw.githubusercontent.com/magdalar/RedSmartKnob/main/RedSmartKnob"

  # Default theme. Override in caller.
  theme: "white"

  project_version: 2026.7.0

packages:
  ######### SENDSPIN MODE ###########
  sendspin: !include ${ "sendspin.yaml" if enable_sendspin else "disabled.yaml" }
  album_art_sendspin: !include ${ "album_art_sendspin.yaml" if enable_sendspin else "disabled.yaml" }
  ######### END SENDSPIN MODE ###########

  ######### REMOTE MEDIAPLAYER MODE ###########
  mediaplayer: !include ${ "disabled.yaml" if enable_sendspin else "mediaplayer.yaml" }
  album_art_url: !include ${ "disabled.yaml" if enable_sendspin else "album_art_url.yaml" }
  ######### END REMOTE MEDIAPLAYER MODE ###########

  esp_config: !include esp-config.yaml
  wifi: !include wifi.yaml
  ha_config: !include ha-config.yaml
  # Logic for startup / boot time.
  startup: !include startup.yaml
  user_settings: !include settings.yaml
  # Touchscreen display initialization.
  display: !include display.yaml
  # UI font and icon definitions.
  fonts: !include fonts.yaml

  # The LVGL user interface definition
  lvgl: !include lvgl.yaml
  lvgl_page_time: !include lvgl_page_time.yaml
  lvgl_page_media_overlay: !include lvgl_page_media_overlay.yaml
  lvgl_page_media_playlists: !include lvgl_page_media_playlists.yaml
  lvgl_page_media_controls: !include lvgl_page_media_controls.yaml

  # The main UI loop and navigation logic
  ui_loop: !include ui_loop.yaml
  # Wiring for the `time` lvgl UI page.
  actions_time: !include actions_time.yaml
  # Wiring between the lvgl UI and the mediaplayer.
  actions_media: !include actions_media.yaml
  # Battery status
  battery: !include adc_battery.yaml
  # Rotary Knob
  rotary_knob: !include rotary_knob.yaml
  # drv2605: haptic feedback.
  drv2605: !include drv2605.yaml
  # TODO: Add the sd card if needed, otherwise just leave it out...
  #sd_card: !include RedSmartKnob/sd_card.yaml

  # Theme modifications. Must come last.
  theme: !include themes/${theme}/theme.yaml

