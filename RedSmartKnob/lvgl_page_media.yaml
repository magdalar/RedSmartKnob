# This is an lvgl page directly.
# Script references should be primarily in actions_media.yaml
# This unit should _not_ reference $mediaplayer.

id: page_media
on_click:
  - script.execute:
      id: show_media_controls_popup
#on_swipe_right:
#  - script.execute:
#      id: set_media_previous
#on_swipe_left:
#  - script.execute:
#      id: set_media_next
bg_color: ${theme_bg_color}
widgets:
  # Add background as first widget in each page
  - image:
      id: bg_image_mediaplayer
      src: bg_image_file
      align: CENTER
      width: 100%
      height: 100%
      
  # Album cover container
  - image:
      id: album_cover_image
      src: album_placeholder  # References the placeholder image
      align: CENTER
      y: -70
      width: 33%
      height: 33%
      zoom: 0.33  # 120px / 360px
      antialias: false
      clickable: false

  # Track information with better spacing
  - label:
      id: track_artist_label
      text_color: ${theme_font_color}
      text_font: theme_font_normal
      align: CENTER
      width: 80%
      text_align: CENTER
      long_mode: SCROLL_CIRCULAR
      anim_duration: 8s
      y: 0
      text: "No Artist"

  - label:
      id: track_name_label
      text_font: theme_font_large
      text_color: ${theme_font_color}
      align: CENTER
      width: 80%
      text_align: CENTER
      long_mode: SCROLL_CIRCULAR
      anim_duration: 8s
      y: 30
      text: "No Track"

  - label:
      id: track_album_label
      text_font: theme_font_small
      text_color: ${theme_font_color2}
      align: CENTER
      width: 80%
      text_align: CENTER
      long_mode: SCROLL_CIRCULAR
      anim_duration: 8s
      y: 55
      text: "No Album"

  - bar:
      id: track_progress_bar
      width: 200
      height: 15
      align: center
      gesture_bubble: true
      y: 75
      value: 0
      bg_color: ${theme_accent_dark_color}
      bg_opa: 100%
      indicator:
        bg_color: ${theme_accent_color}
        bg_opa: 100%

  - label:
      id: track_time_label
      text_font: theme_font_small
      text_color: ${theme_font_color}
      text: "00:00 / 00:00"
      # Align it directly below the progress bar
      align: CENTER
      y: 90
      pad_top: 10

  # Enhanced volume control
  - arc:
      id: volume_control_widget
      adv_hittest: true
      align: CENTER
      y: 0
      width: 90%
      height: 90%
      adjustable: true
      arc_width: 8
      arc_color: ${theme_accent_dark_color}
      indicator:
        arc_color: ${theme_accent_color}
        user_1:
          arc_color: ${theme_warning_color}
      knob:
        bg_color: ${theme_accent_color}
        # This doesn't seem to trigger.
        user_1:
          arc_color: ${theme_warning_color}
      start_angle: 135
      end_angle: 45
      gesture_bubble: true
      on_value:
        - lvgl.widget.update:
            id: volume_control_widget
            state:
              user_1: !lambda 'return x > 80;'
        - script.execute:
            id: set_media_volume
            new_vol: !lambda 'return x / 100.0;'

  # Volume percentage display
  - label:
      id: volume_text
      text_color: ${theme_font_color}
      align: CENTER
      y: 140
      text: "50%"

