# The lvgl UI base

substitutions:
  # Defaults. Override in per-theme yaml.
  theme_font_color: 0x888888
  theme_font_color2: 0xff8888
  theme_bg_color: 0xffffff

image:
  # File paths are relative to the top-level yaml, not this file. So we use http references instead.
  - id: bg_image_file
    file: ${repo_base_uri}/themes/${theme}/bg_360x360.png
    type: RGB565         # good choice for 16-bit displays; change to RGB if you need full color
    resize: 360x360      # optional, keeps the image at the display size (useful for round displays)
    transparency: alpha_channel   # optional — allows PNG alpha blending (requires RGB/RGB565 support)
  
  # Add a static album cover placeholder
  - id: album_placeholder
    file: ${repo_base_uri}/images/album_placeholder.png
    #file: "images/album_placeholder.png"  # Create this 120x120 PNG file
    type: RGB565
    resize: 120x120
    transparency: alpha_channel

lvgl:
  id: my_lvgl
  displays:
    - main_display
  touchscreens:
    - my_touchscreen
  
  # Add color depth specification - Arduino uses 16-bit
  color_depth: 16
  default_font: theme_font_normal

  on_swipe_right:
    - script.execute: navigate_right
  on_swipe_left:
    - script.execute: navigate_left

  top_layer:
    widgets:
      - label:
          id: top_api_status_widget
          text_font: mdi_icons
          text: ${icon_wifi}
          hidden: true
          align: BOTTOM_MID
          text_align: right
          text_color: ${theme_font_color2}

  pages:
    - !include lvgl_media_page.yaml
    - !include lvgl_time_page.yaml
    - !include lvgl_settings_page.yaml
