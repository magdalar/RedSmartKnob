# The lvgl UI base

image:
  # Paths are relative to the top-level yaml, not this file.
  - file: "images/bg.png"
    id: bg_image_file
    type: RGB565         # good choice for 16-bit displays; change to RGB if you need full color
    resize: 360x360      # optional, keeps the image at the display size (useful for round displays)
    transparency: alpha_channel   # optional — allows PNG alpha blending (requires RGB/RGB565 support)
  
  # Optional: Add a static album cover placeholder
  - file: "images/album_placeholder.png"  # Create this 120x120 PNG file
    id: album_placeholder
    type: RGB565
    resize: 120x120
    transparency: alpha_channel

lvgl:
  id: my_lvgl
  displays:
    - main_display
  touchscreens:
    - my_touchscreen
  
  # Add color depth specification - Arduino uses 16-bit
  color_depth: 16

  pages:
    - !include lvgl_media_page.yaml
    - !include lvgl_time_page.yaml
    - !include lvgl_settings_page.yaml
