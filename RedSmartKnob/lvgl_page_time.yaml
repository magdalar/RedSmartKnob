# LVGL Page definition for time & weather.
# Script references should be primarily in actions_time.yaml

lvgl:
  pages:
    - id: page_time
      on_swipe_right:
        - script.execute: navigate_right_swipe
      on_swipe_left:
        - script.execute: navigate_left_swipe
      on_swipe_up:
        - lambda: 'lv_indev_wait_release(lv_indev_get_act());'
        - script.execute:
            id: show_media_controls_popup
            direction: "UP"
      on_swipe_down:
        - lambda: 'lv_indev_wait_release(lv_indev_get_act());'
        - script.execute:
            id: show_media_controls_popup
            direction: "DOWN"
      styles: rsk_page_bg
      widgets:
        - label:
            id: date_widget
            align: TOP_MID
            y: 8%
            long_mode: WRAP
            text_align: CENTER
            text_font: theme_font_large
            text: "<initializing>"

        - label:
            id: time_widget
            long_mode: WRAP
            align: TOP_MID
            y: 20%
            x: -1%
            text_letter_space: 0
            text_font: font_7seg
            text: "--:--:--"

        - label:
            id: outdoor_temp_icon
            text_font: font_mdi_time
            y: 25
            x: -100
            text: "${icon_thermo_outside}"

        - label:
            id: outdoor_temp_label
            text_font: theme_font_large
            y: 25
            text: "–"

        - label:
            id: indoor_temp_icon
            text_font: font_mdi_time
            y: 55
            x: -100
            text: "${icon_thermo_inside}"

        - label:
            id: indoor_temp_label
            text_font: theme_font_large
            y: 55
            text: "–"

        # Enhanced battery arc with better positioning
        - arc:
            id: batt_arc
            hidden: true
            align: CENTER
            y: -120
            width: 80
            height: 80
            start_angle: 135
            end_angle: 45
            arc_width: 8
            arc_color: 0x00FF00  # Keep static green color
            value: 0

        # Battery icon, placed to the left of the percentage text
        - label:
            id: batt_icon
            hidden: true
            text_font: font_mdi_time
            x: -20
            y: -120
            text: "${icon_battery}"

        - label:
            id: batt_text
            hidden: true
            x: 10
            y: -120
            text: "0%"

