# LVGL Page definition for time & weather.
# Script references should be primarily in actions_time.yaml

lvgl:
  pages:
    - id: page_time
      on_swipe_right:
        - script.execute: navigate_right
      on_swipe_left:
        - script.execute: navigate_left
      styles: rsk_page_bg
      widgets:
        # Add background as first widget in each page
        - image:
            id: bg_image_time
            src: bg_image_file
            styles: rsk_bg_image
            align: CENTER
            width: 100%
            height: 100%

        # Clock icon, placed just above the date/time label
        - label:
            id: clock_icon
            text_font: font_mdi_time
            styles: rsk_font_color
            y: -40
            x: -100
            text: "${icon_clock}"

        - label:
            id: date_time_widget
            text_font: theme_font_large
            styles: rsk_font_color
            y: -40
            long_mode: WRAP
            text_align: CENTER
            # This will be overridden by actions_time.yaml
            text: "<initializing>"

        - label:
            id: outdoor_temp_icon
            text_font: font_mdi_time
            styles: rsk_font_color
            y: 25
            x: -100
            text: "${icon_thermo_outside}"

        - label:
            id: outdoor_temp_label
            text_font: theme_font_large
            styles: rsk_font_color
            y: 25
            text: "–"

        - label:
            id: indoor_temp_icon
            text_font: font_mdi_time
            styles: rsk_font_color
            y: 55
            x: -100
            text: "${icon_thermo_inside}"

        - label:
            id: indoor_temp_label
            text_font: theme_font_large
            styles: rsk_font_color
            y: 55
            text: "–"

        # Enhanced battery arc with better positioning
        - arc:
            id: batt_arc
            hidden: true
            align: CENTER
            y: -120
            width: 80
            height: 80
            start_angle: 135
            end_angle: 45
            arc_width: 8
            arc_color: 0x00FF00  # Keep static green color
            value: 0

        # Battery icon, placed to the left of the percentage text
        - label:
            id: batt_icon
            hidden: true
            text_font: font_mdi_time
            styles: rsk_font_color
            x: -20
            y: -120
            text: "${icon_battery}"

        - label:
            id: batt_text
            hidden: true
            styles: rsk_font_color
            x: 10
            y: -120
            text: "0%"

