globals:
  - id: local_track_position
    type: float
    initial_value: '0.0'

  - id: local_track_duration
    type: float
    initial_value: '0.0'

esphome:
  on_boot:
    # HA sensors setup runs at AFTER_CONNECTION (100). So long as we run after
    # DATA (600), we should be good.
    - priority: 300
      then:
        # Media Player Entity
        - lambda: |-
            // Static as set_entity_id takes the c_str pointer.
            static const std::string new_entity = id(preference_media_player_entity).state;
            if (!new_entity.empty()) {
              ESP_LOGI("actions_time", "Updating media player entity: %s", new_entity.c_str());
              id(outdoor_temperature)->set_entity_id(new_entity.c_str());
              id(preference_media_player_entity).publish_state(new_entity);
            }

# Add API connection event to initialize everything when HA is connected
api:
  on_client_connected:
    - if:
        condition:
          api.connected:
            state_subscription_only: true
        then:
          - delay: 1s  # Give sensors time to get initial values
          # Request an explicit update from the source.
          # This will push updates through the normal sensors.
          - homeassistant.service:
              service: homeassistant.update_entity
              data:
                entity_id: !lambda 'return id(preference_media_player_entity).state;'

text_sensor:
  - platform: homeassistant
    id: music_state
    entity_id: $mediaplayer
    internal: true
    on_value:
      - lambda: |-
          ESP_LOGD("mediaplayer", "Music state changed to: %s", x.c_str());
      - if:
          condition:
            lambda: 'return x == "playing";'
          then:
            - script.execute: handle_media_playing
      - if:
          condition:
            lambda: 'return x == "paused";'
          then:
            - script.execute: handle_media_paused
      - if:
          condition:
            lambda: 'return x == "idle" || x == "off" || x == "unknown";'
          then:
            - script.execute: handle_media_stopped

  - platform: homeassistant
    id: track_name
    entity_id: $mediaplayer
    attribute: media_title
    on_value:
      - script.execute:
          id: handle_media_track_changed
          track_name: !lambda 'return x;'

  - platform: homeassistant
    id: track_artist
    entity_id: $mediaplayer
    attribute: media_artist
    internal: true
    on_value:
      - script.execute:
          id: handle_media_artist_changed
          artist_name: !lambda 'return x;'

  - platform: homeassistant
    id: track_album
    entity_id: $mediaplayer
    attribute: media_album_name
    internal: true
    on_value:
      - script.execute:
          id: handle_media_album_changed
          album_name: !lambda 'return x;'

  - platform: homeassistant
    id: media_thumbnail
    entity_id: $mediaplayer
    attribute: entity_picture
    internal: true
    on_value:
      - if:
          condition:
            lambda: 'return !x.empty();'
          then:
            - delay: 150ms  # give some room to breathe
            - script.execute:
                id: handle_media_album_url
                url: !lambda 'return x;'

binary_sensor:
  - platform: homeassistant
    id: media_is_muted
    entity_id: $mediaplayer
    attribute: is_volume_muted
    internal: true
    on_state:
      - lambda: |-
          if (x) {
            id(handle_media_volume_muted)->execute();
          } else {
            id(handle_media_volume_unmuted)->execute();
          }

sensor:
  - platform: homeassistant
    id: media_player_volume
    entity_id: $mediaplayer
    attribute: volume_level
    internal: true
    filters:
      - throttle: 100ms  # Prevent rapid updates
    on_value:
      - if:
          condition:
            lambda: 'return !isnan(x) && x >= 0.0 && x <= 1.0;'
          then:
            - lambda: |-
                id(handle_media_volume_changed)->execute(x);

  # media_position will only get updated on track start, seek or pause.
  - platform: homeassistant
    id: media_position
    entity_id: $mediaplayer
    attribute: media_position
    internal: true
    on_value:
      - lambda: |-
          ESP_LOGD("mediaplayer", "Position sync: %.1f", x);
          id(local_track_position) = x;

  # Add media duration sensor for better seeking
  - platform: homeassistant
    id: media_duration
    entity_id: $mediaplayer
    attribute: media_duration
    internal: true
    on_value:
      - lambda: |-
          ESP_LOGD("mediaplayer", "Track duration updated: %.1f", x);
          id(local_track_duration) = x;

script:
  # This is called by actions_media.yaml on_boot to apply preference_media_player_entity
  - id: set_mediaplayer_entity_id
    parameters:
      new_media_player_id: std::string
    then:
      lambda: |-
        // We need to cache it for the lifetime of the process, as set_entity_id takes the ptr.
        // This can only be called once on_boot, so this should be safe.
        static const std::string new_entity = new_media_player_id;
        ESP_LOGI("mediaplayer", "Updating media player entity: %s", new_entity.c_str());
        id(music_state)->set_entity_id(new_entity.c_str());
        id(track_name)->set_entity_id(new_entity.c_str());
        id(track_artist)->set_entity_id(new_entity.c_str());
        id(track_album)->set_entity_id(new_entity.c_str());
        id(media_thumbnail)->set_entity_id(new_entity.c_str());
        id(media_is_muted)->set_entity_id(new_entity.c_str());
        id(media_player_volume)->set_entity_id(new_entity.c_str());
        id(media_position)->set_entity_id(new_entity.c_str());
        id(media_duration)->set_entity_id(new_entity.c_str());

  - id: set_media_volume
    parameters:
        new_vol: float
    then:
      - lambda: |-
          ESP_LOGI("mediaplayer", "set_media_volume[%.2f] triggered.", new_vol);
      - if:
          condition:
            lambda: 'return id(api_ready);'
          then:
            - homeassistant.action:
                action: media_player.volume_set
                data:
                  entity_id: !lambda 'return id(preference_media_player_entity).state;'
                  volume_level: !lambda |-
                    if (new_vol < 0.0) new_vol = 0.0;
                    if (new_vol > 100.0) new_vol = 100.0;
                    return new_vol;

  - id: set_media_volume_mute
    then:
      - lambda: |-
          ESP_LOGI("mediaplayer", "set_media_volume_mute triggered.");
      - if:
          condition:
            lambda: 'return id(api_ready);'
          then:
            - homeassistant.action:
                action: media_player.volume_mute
                data:
                  is_volume_muted: "true"
                  entity_id: !lambda 'return id(preference_media_player_entity).state;'

  - id: set_media_volume_unmute
    then:
      - lambda: |-
          ESP_LOGI("mediaplayer", "set_media_volume_unmute triggered.");
      - if:
          condition:
            lambda: 'return id(api_ready);'
          then:
            - homeassistant.action:
                action: media_player.volume_mute
                data:
                  is_volume_muted: "false"
                  entity_id: !lambda 'return id(preference_media_player_entity).state;'

  - id: set_media_play_pause
    then:
      - lambda: |-
          ESP_LOGI("mediaplayer", "set_media_play_pause triggered.");
      - if:
          condition:
            lambda: 'return id(api_ready);'
          then:
            - homeassistant.action:
                action: media_player.media_play_pause
                data:
                  entity_id: !lambda 'return id(preference_media_player_entity).state;'

  - id: set_media_next
    then:
      - lambda: |-
          ESP_LOGI("mediaplayer", "set_media_next triggered.");
      - if:
          condition:
            lambda: 'return id(api_ready);'
          then:
            - homeassistant.action:
                action: media_player.media_next_track
                data:
                  entity_id: !lambda 'return id(preference_media_player_entity).state;'

  - id: set_media_previous
    then:
      - lambda: |-
          ESP_LOGI("mediaplayer", "set_media_previous triggered.");
      - if:
          condition:
            lambda: 'return id(api_ready);'
          then:
            - homeassistant.action:
                action: media_player.media_previous_track
                data:
                  entity_id: !lambda 'return id(preference_media_player_entity).state;'

# Provide real-time playback position (dead reckoning)
interval:
  - interval: 1s
    then:
      - lambda: |-
          if (id(music_state).state == "playing") {
            id(local_track_position) += 1.0;

            if (id(local_track_duration) > 0) {
              id(handle_media_progress)->execute(
                id(local_track_position), id(local_track_duration));
            }
          }

