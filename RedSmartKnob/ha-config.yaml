
# Enable logging
logger:
  #level: VERY_VERBOSE
  level: DEBUG
  #level: INFO
  #baud_rate: 0

debug:
  # was 5s
  update_interval: 60s

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

time:
  - platform: homeassistant
    id: ha_time
    on_time:
      - seconds: /1
        then:
          - script.execute: update_time_labels

text_sensor:
  - platform: version
    name: "Esphome Version"

  - platform: debug
    reset_reason:
      name: "Reset Reason"

binary_sensor:
  - platform: status
    name: "Connection Status"

button:
  - platform: restart
    name: "Restart"
    id: re_start
    entity_category: diagnostic

sensor:
  # Free memory info
  - platform: debug
    free:
      name: "Heap Free"
    block:
      name: "Heap Max Block"
    loop_time:
      name: "Loop Time"

