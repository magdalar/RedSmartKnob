# LVGL Page definition for media controls.
# Script references should be primarily in actions_media.yaml
# This unit should _not_ reference $mediaplayer.

.style.media_controls_button: &media_controls_button
  styles: rsk_bg_accent
  pressed:
    styles: rsk_bg_accent_dark

lvgl:
  pages:
    - id: page_media_controls
      skip: true
      on_swipe_bottom:
        - script.execute: hide_popups
      styles: rsk_page_bg
      widgets:
        # Add background as first widget in each page
        - image:
            id: bg_image_media_controls
            src: album_placeholder
            styles: rsk_bg_image
            align: CENTER
            width: 100%
            height: 100%

        - button:
            id: controls_dismiss
            <<: *media_controls_button
            align: top_mid
            y: 10
            width: 10%
            height: 10%
            ext_click_area: 20
            on_click:
              - script.execute: hide_popups
            widgets:
              - label:
                  styles: rsk_font_color
                  text_font: theme_font_large
                  text: "X"


        # Translucent caption band across the top-middle, below the dismissal.
        - obj:
            x: 0%
            y: 18%
            width: 100%
            height: 23%
            radius: 0
            styles: rsk_opacity_bg
            border_width: 0
            pad_all: 0
            scrollable: false
            widgets:
              - label:
                  id: track_artist_label_controls
                  align: TOP_MID
                  width: 85%
                  y: 3%
                  styles: rsk_font_color2
                  text_font: theme_font_normal
                  long_mode: SCROLL_CIRCULAR
                  anim_duration: 8s
                  text: "Unknown Artist"
              - label:
                  id: track_name_label_controls
                  align: CENTER
                  width: 90%
                  styles: rsk_font_color
                  text_font: theme_font_large
                  long_mode: SCROLL_CIRCULAR
                  anim_duration: 8s
                  text: "Unknown Track"
              - label:
                  id: track_album_label_controls
                  align: BOTTOM_MID
                  y: -5%
                  width: 95%
                  styles: rsk_font_color2
                  text_font: theme_font_small
                  long_mode: SCROLL_CIRCULAR
                  anim_duration: 8s
                  text: "Unknown Album"

        - obj:
            align: CENTER
            width: 90%
            height: 20%
            y: 5%
            bg_opa: TRANSP
            border_opa: TRANSP
            layout: horizontal
            pad_all: ${ui_padding}
            gesture_bubble: true
            widgets:
              - button:
                  id: controls_previous
                  <<: *media_controls_button
                  on_click:
                    - script.execute: set_media_previous
                  widgets:
                    - label:
                        text: ${icon_previous}
                        text_font: font_mdi_media
              - button:
                  id: controls_toggle_button
                  <<: *media_controls_button
                  on_click:
                    - script.execute: set_media_play_pause
                  widgets:
                    - label:
                        text: ${icon_play_pause}
                        text_font: font_mdi_media
              - button:
                  id: controls_next
                  <<: *media_controls_button
                  on_click:
                    - script.execute: set_media_next
                  widgets:
                    - label:
                        text: ${icon_next}
                        text_font: font_mdi_media

        # Volume control
        - slider:
            id: volume_control_widget
            align: CENTER
            y: 25%
            width: 60%
            height: 4%
            styles: rsk_bg_accent_dark
            indicator:
              styles: rsk_bg_accent
              user_1:
                styles: rsk_bg_warning
            knob:
              styles: rsk_bg_accent
              user_1:
                styles: rsk_bg_warning
            gesture_bubble: true
            # on_value causes a loop when the value is updated from e.g. sendspin.
            # on_release only does it on user release.
            on_release:
              - lvgl.widget.update:
                  id: volume_control_widget
                  state:
                    user_1: !lambda 'return x > 80;'
              - script.execute:
                  id: set_media_volume
                  new_vol: !lambda 'return x / 100.0;'

        # Volume percentage display
        - label:
            id: volume_text
            align: CENTER
            y: 32%
            styles: rsk_font_color
            text_font: theme_font_normal
            text: "XX%"

