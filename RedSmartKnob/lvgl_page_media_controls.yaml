# This is an lvgl page directly.
# Script references should be primarily in actions_media.yaml
# This unit should _not_ reference $mediaplayer.

id: page_media_controls
skip: true
bg_color: ${theme_bg_color}
widgets:
  # Add background as first widget in each page
  - image:
      id: bg_image_media_controls
      src: bg_image_file
      align: CENTER
      width: 100%
      height: 100%

  - button:
      id: controls_dismiss
      align: top_mid
      y: 10
      width: 10%
      height: 10%
      ext_click_area: 20
      bg_color: ${theme_button_bg_color}
      bg_opa: COVER
      radius: ${ui_radius}
      border_color: ${theme_button_border_color}
      border_width: ${ui_border}
      pressed:
        bg_color: ${theme_button_pressed_bg_color}
        border_color: ${theme_button_pressed_border_color}
        border_width: ${ui_border_pressed}
      gesture_bubble: true
      on_click:
        - script.execute: hide_popups
      widgets:
        - label:
            align: CENTER
            text: "X"
            text_color: ${theme_font_color}
            text_font: theme_font_large

  - obj:
      align: CENTER
      width: 90%
      height: 90%
      bg_opa: TRANSP
      border_opa: TRANSP
      layout: horizontal
      pad_all: ${ui_padding}
      gesture_bubble: true
      widgets:
        - button:
            id: controls_previous
            width: 20%
            height: 20%
            bg_color: ${theme_button_bg_color}
            bg_opa: COVER
            radius: ${ui_radius}
            border_color: ${theme_button_border_color}
            border_width: ${ui_border}
            pressed:
              bg_color: ${theme_button_pressed_bg_color}
              border_color: ${theme_button_pressed_border_color}
              border_width: ${ui_border_pressed}
            gesture_bubble: true
            on_click:
              - script.execute: set_media_previous
            widgets:
              - label:
                  align: CENTER
                  text: ${icon_previous}
                  text_color: ${theme_font_color}
                  text_font: font_mdi_media
        - button:
            id: controls_toggle_button
            width: 20%
            height: 20%
            bg_color: ${theme_button_bg_color}
            bg_opa: COVER
            radius: ${ui_radius}
            border_color: ${theme_button_border_color}
            border_width: ${ui_border}
            pressed:
              bg_color: ${theme_button_pressed_bg_color}
              border_color: ${theme_button_pressed_border_color}
              border_width: ${ui_border_pressed}
            gesture_bubble: true
            on_click:
              - script.execute: set_media_play_pause
            widgets:
              - label:
                  align: CENTER
                  text: ${icon_play_pause}
                  text_color: ${theme_font_color}
                  text_font: font_mdi_media
        - button:
            id: controls_next
            width: 20%
            height: 20%
            bg_color: ${theme_button_bg_color}
            bg_opa: COVER
            radius: ${ui_radius}
            border_color: ${theme_button_border_color}
            border_width: ${ui_border}
            pressed:
              bg_color: ${theme_button_pressed_bg_color}
              border_color: ${theme_button_pressed_border_color}
              border_width: ${ui_border_pressed}
            gesture_bubble: true
            on_click:
              - script.execute: set_media_next
            widgets:
              - label:
                  align: CENTER
                  text: ${icon_next}
                  text_color: ${theme_font_color}
                  text_font: font_mdi_media

  # Volume control
  - slider:
      id: volume_control_widget
      align: CENTER
      y: 25%
      width: 60%
      height: 4%
      bg_color: ${theme_accent_dark_color}
      indicator:
        bg_color: ${theme_accent_color}
        user_1:
          arc_color: ${theme_warning_color}
      knob:
        bg_color: ${theme_accent_color}
        user_1:
          arc_color: ${theme_warning_color}
      gesture_bubble: true
      on_value:
        - lvgl.widget.update:
            id: volume_control_widget
            state:
              user_1: !lambda 'return x > 80;'
        - script.execute:
            id: set_media_volume
            new_vol: !lambda 'return x / 100.0;'

  # Volume percentage display
  - label:
      id: volume_text
      text_color: ${theme_font_color}
      align: CENTER
      y: 32%
      text: "XX%"

