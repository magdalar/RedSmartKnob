# This is an lvgl page directly.
# Script references should be primarily in actions_media.yaml
# This unit should _not_ reference $mediaplayer.

id: media_player_page
on_click:
  - script.execute:
      id: set_media_play_pause
#on_swipe_right:
#  - script.execute:
#      id: set_media_previous
#on_swipe_left:
#  - script.execute:
#      id: set_media_next
bg_color: ${theme_bg_color}
widgets:
  # Add background as first widget in each page
  - image:
      id: bg_image_mediaplayer
      src: bg_image_file
      align: CENTER
      width: 100%
      height: 100%
      
  # Album cover container
  - image:
      id: album_cover_image
      src: album_placeholder  # References the placeholder image
      align: CENTER
      y: -70
      width: ${imagewidth}
      height: ${imageheight}
      antialias: false
      clickable: false

  # Track information with better spacing
  - label:
      id: track_artist_widget
      text_color: ${theme_font_color}
      align: CENTER
      width: 80%
      text_align: CENTER
      long_mode: SCROLL_CIRCULAR
      y: 0
      text: "No Artist"

  - label:
      id: track_name_widget
      text_font: theme_font_large
      text_color: ${theme_font_color}
      align: CENTER
      width: 80%
      text_align: CENTER
      long_mode: SCROLL_CIRCULAR
      y: 30
      text: "No Track"

  - label:
      id: track_album_widget
      text_font: theme_font_small
      text_color: ${theme_font_color2}
      align: CENTER
      width: 80%
      text_align: CENTER
      long_mode: DOT
      y: 60
      text: "No Album"

  - bar:
      id: track_progress_bar
      width: 200
      height: 15
      align: center
      y: 75
      value: 0

  - label:
      id: track_time_label
      text_font: theme_font_small
      text_color: ${theme_font_color}
      text: "00:00 / 00:00"
      # Align it directly below the progress bar
      align: CENTER
      y: 90
      pad_top: 10

  # Enhanced volume control
  - arc:
      id: volume_control_widget
      adv_hittest: true
      align: CENTER
      y: 0
      width: 320
      height: 320
      adjustable: true
      arc_width: 8
      arc_color: 0x00BFFF
      start_angle: 135
      end_angle: 45
      on_value:
        - script.execute:
            id: set_media_volume
            new_vol: !lambda 'return x / 100.0;'

  # Volume percentage display
  - label:
      id: volume_text
      text_color: ${theme_font_color}
      align: CENTER
      y: 140
      text: "50%"

