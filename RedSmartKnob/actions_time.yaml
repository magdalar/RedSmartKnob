# This unit provides the logic for the `time` page.
substitutions:
  dev_has_battery: "false"

time:
  - id: !extend ha_time
    on_time:
      - seconds: /1
        then:
          - script.execute: update_time_labels

globals:
  - id: batt_percent
    type: int
    initial_value: '0'

sensor:
  - platform: homeassistant
    id: outdoor_temperature
    attribute: temperature
    entity_id: $weather
    on_value:
      then:
        - lvgl.label.update:
            id: outdoor_temp_label
            # TODO: The C should come from HA too.
            text: !lambda 'char b[16]; snprintf(b, sizeof(b), "%.1f°C", x); return std::string(b);'

  - platform: homeassistant
    id: indoor_temperature
    #attribute: temperature
    entity_id: $indoor_temp_entity
    on_value:
      then:
        - lvgl.label.update:
            id: indoor_temp_label
            # TODO: The C should come from HA too.
            text: !lambda 'char b[16]; snprintf(b, sizeof(b), "%.1f°C", x); return std::string(b);'

text:
  - platform: template
    name: "Date Format"
    id: setting_date_format
    optimistic: true
    entity_category: config
    icon: "mdi:calendar-clock"
    mode: text
    initial_value: "%a %d %b"
    restore_value: true

  - platform: template
    name: "Time Format"
    id: setting_time_format
    optimistic: true
    entity_category: config
    icon: "mdi:clock-outline"
    mode: text
    initial_value: "%H:%M:%S"
    restore_value: true

  - platform: template
    name: "Weather Entity"
    id: preference_weather_entity
    entity_category: config
    mode: text
    initial_value: "${weather}"
    restore_value: true
    set_action:
      - lambda: |-
          if (x.empty() || x == id(preference_weather_entity).state) {
            // It's good, but nothing needs to change.
            id(preference_weather_entity).publish_state(x);
            return;
          }
          if (!x.starts_with("weather.")) {
            // It's bad, reject it. Don't need to reboot.
            ESP_LOGW("actions_time", "Rejecting invalid weather entity; must start with \"weather.\"; found: %s", x.c_str());
            id(preference_weather_entity).publish_state(id(preference_weather_entity).state);
            return;
          }
          // New value accepted, ask for a reboot.
          id(preference_weather_entity).publish_state(x);
          ESP_LOGI("actions_time", "New weather entity: %s. Will request reboot.", x.c_str());
          id(slow_trigger_reboot_sequence)->execute();

  - platform: template
    name: "Indoor Temperature Entity"
    id: preference_indoor_temp_entity
    entity_category: config
    mode: text
    initial_value: "${indoor_temp_entity}"
    restore_value: true
    set_action:
      - lambda: |-
          if (x.empty() || x == id(preference_indoor_temp_entity).state) {
            // It's good, but nothing needs to change.
            id(preference_indoor_temp_entity).publish_state(x);
            return;
          }
          if (!x.starts_with("sensor.")) {
            // It's bad, reject it. Don't need to reboot.
            ESP_LOGW("actions_time", "Rejecting invalid indoor temperature entity; must start with \"sensor.\"; found: %s", x.c_str());
            id(preference_indoor_temp_entity).publish_state(id(preference_indoor_temp_entity).state);
            return;
          }
          // New value accepted, ask for a reboot.
          id(preference_indoor_temp_entity).publish_state(x);
          ESP_LOGI("actions_time", "New indoor temperature entity: %s. Will request reboot.", x.c_str());
          id(slow_trigger_reboot_sequence)->execute();

esphome:
  on_boot:
    # HA sensors setup runs at AFTER_CONNECTION (100). So long as we run after
    # DATA (600), we should be good.
    - priority: 300
      then:
        # Weather Entity
        - lambda: |-
            // Static as set_entity_id takes the c_str pointer.
            static const std::string new_entity = id(preference_weather_entity).state;
            if (!new_entity.empty()) {
              ESP_LOGI("actions_time", "Updating weather entity: %s", new_entity.c_str());
              id(outdoor_temperature)->set_entity_id(new_entity.c_str());
              id(preference_weather_entity).publish_state(new_entity);
            }
        # Indoor Temperature Entity
        - lambda: |-
            // Static as set_entity_id takes the c_str pointer.
            static const std::string new_entity = id(preference_indoor_temp_entity).state;
            if (!new_entity.empty()) {
              ESP_LOGI("actions_time", "Updating indoor temperature entity: %s", new_entity.c_str());
              id(indoor_temperature)->set_entity_id(new_entity.c_str());
              id(preference_indoor_temp_entity).publish_state(new_entity);
            }
        # Show battery widgets if there's a battery
        - if:
            condition:
              - lambda: 'return ${dev_has_battery};'
            then:
              - lvgl.widget.show:
                - batt_arc
                - batt_icon
                - batt_text

script:
  - id: handle_battery_update
    parameters:
        new_battery_level: float
    then:
      - lambda: |-
          // guard against NaN/Inf from filters or template
          if (std::isnan(new_battery_level) || std::isinf(new_battery_level)) {
            id(batt_percent) = 0;
            return;
          }
          // round and clamp to 0..100
          int pct = (int)round(new_battery_level);
          if (pct < 0) pct = 0;
          if (pct > 100) pct = 100;
          id(batt_percent) = pct;
      - if:
          condition:
            lambda: 'return id(batt_percent) < 20.0;'
          then:
            - logger.log: "Warning: Battery is low!"
      # update the arc value and color
      - lvgl.arc.update:
          id: batt_arc
          value: !lambda 'return id(batt_percent);'
          arc_color: !lambda |-
            int pct = id(batt_percent);
            if (pct > 50) return lv_color_hex(0x00FF00);
            else if (pct > 20) return lv_color_hex(0xFFA500);
            else return lv_color_hex(0xFF0000);
      # update percentage text
      - lvgl.label.update:
          id: batt_text
          text: !lambda 'return std::to_string(id(batt_percent)) + "%";'

  - id: update_time_labels
    then:
      - lvgl.label.update:
          id: date_widget
          text: !lambda 'return id(ha_time).now().strftime(id(setting_date_format).state.c_str());'
      - lvgl.label.update:
          id: time_widget
          text: !lambda 'return id(ha_time).now().strftime(id(setting_time_format).state.c_str());'

