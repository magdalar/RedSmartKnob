substitutions:
  firmware_version: "dev"

esphome:
  friendly_name: "${friendly_name}"
  name: "${name}"
  comment: "${comment}"
  min_version: 2026.7.0
  name_add_mac_suffix: true
  project:
    name: magdalar.RedSmartKnob
    version: ${firmware_version}

# Enable logging
logger:
  level: INFO

# Enable Home Assistant API.
# Top-level config should establish an encryption key.
api:

time:
  - platform: homeassistant
    id: ha_time

text_sensor:
  - platform: version
    name: "ESPHome Version"

  - platform: debug
    reset_reason:
      name: "Reset Reason"

binary_sensor:
  - platform: status
    name: "Connection Status"

button:
  - platform: restart
    name: "Restart"
    id: re_start
    entity_category: diagnostic

debug:
  update_interval: 60s

sensor:
  # Free memory info
  - platform: debug
    free:
      name: "Heap Free"
    block:
      name: "Heap Max Block"
    loop_time:
      name: "Loop Time"

script:
  - id: trigger_reboot_sequence
    mode: restart
    then:
      - logger.log: "Initiating reboot sequence..."
      - lambda: |-
          global_preferences->sync();
      - delay: 500ms
      - logger.log: "Restarting now!"
      - button.press: re_start

  - id: slow_trigger_reboot_sequence
    mode: restart
    then:
      - logger.log: "Reboot requested. Waiting a minute for further updates..."
      - delay: 60s
      - script.execute: trigger_reboot_sequence


