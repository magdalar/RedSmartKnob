# LVGL Page definition for Light/Fan controls.

lvgl:
  pages:
    - id: page_light_fan
      on_swipe_right:
        - script.execute: navigate_right
      on_swipe_left:
        - script.execute: navigate_left
      styles: rsk_page_bg
      widgets:
        - obj:
            id: light_fan_backdrop
            width: 100%
            height: 100%
            bg_opa: 0%
            border_width: 0

            widgets:
              # ==========================================
              #             LEFT SIDE (LIGHT)
              # ==========================================

              # 1. The Brightness Arc
              - arc:
                  id: light_brightness_arc
                  align: CENTER
                  width: 94%
                  height: 94%
                  adjustable: true
                  adv_hittest: true
                  ext_click_area: 10
                  start_angle: 135
                  end_angle: 225
                  min_value: 0
                  max_value: 100
                  value: 128
                  arc_width: 15
                  knob:
                    bg_color: 0xFFA500 # Warm orange/yellow tint
                  indicator:
                    arc_width: 15
                    arc_color: 0xFFA500 # Warm orange/yellow tint
                  on_release:
                    if:
                      condition:
                        lambda: 'return x > 0;'
                      then:
                        - script.execute:
                            id: light_turn_on
                            pct: !lambda 'return x;'
                      else:
                        - script.execute: light_turn_off

              # 2. The Light Toggle Button
              - button:
                  id: light_toggle_button
                  align: CENTER
                  x: -22%
                  y: 0%
                  width: 25%
                  height: 25%
                  radius: 1000  # perfect circle
                  checkable: true
                  styles: rsk_bg_accent_dark
                  checked:
                    styles: rsk_bg_accent
                  on_single_click:
                    - script.execute: light_toggle
                  widgets:
                    - label:
                        id: light_toggle_button_label
                        text_font: font_mdi_light_fan
                        text: ${icon_lightbulb}

              # ==========================================
              #             RIGHT SIDE (FAN)
              # ==========================================

              # 1. The Fan Speed Arc
              - arc:
                  id: fan_speed_arc
                  align: CENTER
                  width: 94%
                  height: 94%
                  adjustable: true
                  adv_hittest: true
                  ext_click_area: 10
                  mode: reverse
                  start_angle: 315
                  end_angle: 45
                  min_value: 0
                  max_value: 100
                  value: 50
                  arc_width: 15
                  knob:
                    bg_color: 0x00BFFF
                  indicator:
                    arc_width: 15
                    arc_color: 0x00BFFF
                  on_release:
                    if:
                      condition:
                        lambda: 'return x > 0;'
                      then:
                        - script.execute:
                            id: fan_turn_on
                            pct: !lambda 'return x;'
                      else:
                        - script.execute: fan_turn_off

              # 2. The Fan Toggle Button
              - button:
                  id: fan_toggle_button
                  align: CENTER
                  x: 22%  # Scaled from 80px
                  y: 0%
                  width: 25%
                  height: 25%
                  radius: 1000  # perfect circle
                  checkable: true
                  styles: rsk_bg_accent_dark
                  checked:
                    styles: rsk_bg_accent
                  on_single_click:
                    - script.execute: fan_toggle
                  widgets:
                    - label:
                        text_font: font_mdi_light_fan
                        text: ${icon_fan}

