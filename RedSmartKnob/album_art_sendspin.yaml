# Album Art: sendspin source.
# Calls handle_media_album_art_display or handle_media_album_art_display_placeholder
# Script handle_media_album_url exists, but is unexpected.

external_components:
  # From https://github.com/RealDeco/xiaozhi-esphome/blob/main/devices/Under_Development/Modular/HW/sendspin-external_components.yaml
  - source: github://pr#16057
    components: [generic_image, sendspin, psram]
    refresh: 1d

script:
  - id: handle_media_album_url
    parameters:
      url: std::string
    then:
      - lambda: |-
          ESP_LOGI("album_art_sendspin", "Unexpected call: sendspin handle_media_album_url: %s", url);
      - script.execute:
          id: handle_media_album_art_display_placeholder

generic_image:
  - platform: sendspin
    id: sendspin_album_art
    format: jpeg
    type: RGB565
    resize: ${screenheight}x${screenheight}
    source: ALBUM
    on_image_display:
      # https://github.com/esphome/esphome/pull/16057#issuecomment-4944414858
      # the callback is called when the image is cleared, as well as when
      # loaded, so guard accordingly.
      - if:
          condition:
            lambda: 'return id(sendspin_album_art).is_loaded();'
          then:
            - script.execute:
                id: handle_media_album_art_display
                art_source: sendspin_album_art
          else:
            - script.execute:
                id: handle_media_album_art_display_placeholder
    on_image_error:
      - lambda: |-
          ESP_LOGI("album_art_sendspin", "Album art download failed!");
      - script.execute:
          id: handle_media_album_art_display_placeholder

