# The core UI loop and navigation
# To add a new page:
#   - define the lvgl page
#   - add it to internal_navigate_to_animated
#   - add it to current_page_enum
#   - add it to rebuild_ui_pages
globals:
  - id: ui_pages
    type: std::vector<std::string>
    initial_value: '{"time", "media", "playlists", "light_fan"}'

esphome:
  on_boot:
    # Run after HA Sensors (AFTER_CONNECTION 100)
    - priority: 50
      then:
        - script.execute: rebuild_ui_pages

    - priority: -100
      then:
        - script.execute:
            id: navigate_to
            target: !lambda 'return id(idle_page_preference).current_option();'

select:
  - platform: template
    id: current_page_enum
    internal: true
    optimistic: true
    # All possible pages should be listed here.
    options:
      - "time"
      - "media"
      - "playlists"
      - "light_fan"
    initial_option: "time"
    on_value:
      - text_sensor.template.publish:
          id: public_current_page
          state: !lambda 'return x;'

  - platform: template
    id: active_popup_enum
    internal: true
    optimistic: true
    options:
      - "none"
      - "media_controls"
    initial_option: "none"
    on_value:
      - text_sensor.template.publish:
          id: public_active_popup
          state: !lambda 'return x;'

text_sensor:
  # A read-only copy of the current_page_enum, published to HA.
  - platform: template
    id: public_current_page
    name: "Current Page"
    icon: "mdi:tablet-dashboard"
    entity_category: diagnostic

  - platform: template
    id: public_active_popup
    name: "Currently Active Popup"
    icon: "mdi:forum-outline"
    entity_category: diagnostic

script:
  # Rebuild the navigation depending on what's enabled.
  - id: rebuild_ui_pages
    then:
      - lambda: |-
          std::vector<std::string>& pages = id(ui_pages);
          pages.clear(); // Empty the array

          // Add base pages
          pages.push_back("time");
          pages.push_back("media");
          pages.push_back("playlists");

          // Conditionally add optional pages
          if (id(enable_light_fan_page).state) {
            pages.push_back("light_fan");
          }

  - id: api_connected
    then:
      - lvgl.widget.show: top_api_status_widget

  - id: api_disconnected
    then:
      - lvgl.widget.hide: top_api_status_widget

  - id: standby_screen_activity
    mode: restart
    then:
      - light.turn_on: back_light
      - delay: !lambda |-
          return (uint32_t) (id(screen_timeout_seconds).state * 1000.0f);
      - light.turn_off: back_light

  - id: screen_off
    then:
      - script.stop: standby_screen_activity
      - light.turn_off: back_light

  - id: reset_idle_timer
    mode: restart
    then:
      - script.execute: standby_screen_activity
      - delay: !lambda |-
          return (uint32_t) (id(idle_timeout_seconds).state * 1000.0f);
      # 1. First, hide any active popups
      - if:
          condition:
            lambda: 'return id(active_popup_enum).current_option() != "none";'
          then:
            - script.execute: hide_popups

      # 2. Then, check if we need to return to the default page
      - if:
          condition:
            lambda: |-
              // Compare current page to the HA select preference
              return id(current_page_enum).current_option() != id(idle_page_preference).current_option();
          then:
            - logger.log: "Idle timeout reached, reverting to default page."
            - script.execute:
                id: navigate_to
                target: !lambda 'return id(idle_page_preference).current_option();'

  - id: navigate_to
    parameters:
      target: std::string
    then:
      - script.execute:
          id: navigate_to_animated
          target: !lambda "return target;"
          direction: "NONE"

  - id: navigate_to_animated
    parameters:
      target: std::string
      direction: std::string
    then:
      # 1. Update the global state
      - select.set:
          id: active_popup_enum
          option: "none"
      - select.set:
          id: current_page_enum
          option: !lambda 'return target.c_str();'
      - script.execute:
          id: internal_navigate_to_animated
          target: !lambda 'return target;'
          direction: !lambda 'return direction;'

  - id: internal_navigate_to_animated
    parameters:
      target: std::string
      direction: std::string
    then:
      # 1. Caller must already update the current_page_enum and active_popup_enum.

      # 2. Restart the idle timer since navigation implies user activity
      - script.execute: reset_idle_timer

      # Perform the navigation
      - lambda: |-
          // 1. Determine the native LVGL animation type
          lv_scr_load_anim_t anim = LV_SCR_LOAD_ANIM_NONE;
          if (direction == "LEFT") {
            anim = LV_SCR_LOAD_ANIM_MOVE_LEFT;
          } else if (direction == "RIGHT") {
            anim = LV_SCR_LOAD_ANIM_MOVE_RIGHT;
          } else if (direction == "UP") {
            anim = LV_SCR_LOAD_ANIM_MOVE_TOP;
          } else if (direction == "DOWN") {
            anim = LV_SCR_LOAD_ANIM_MOVE_BOTTOM;
          }

          // 2. Map the string target to your actual LVGL page IDs
          lv_obj_t *page_ptr = nullptr;
          if (target == "time") page_ptr = id(page_time).obj;
          else if (target == "media") page_ptr = id(page_media_overlay).obj;
          else if (target == "playlists") page_ptr = id(page_media_playlists).obj;
          else if (target == "light_fan") page_ptr = id(page_light_fan).obj;
          // Popups are also supported in internal_navigate_to_animated
          else if (target == "media_controls") page_ptr = id(page_media_controls).obj;
          else ESP_LOGE("ui_loop", "Unknown navigate_to target: %s", target.c_str());

          // 3. Execute the transition
          if (page_ptr != nullptr) {
            // Function args:
            // Target Page Pointer, Animation Type, Duration (ms), Delay (ms), Auto-Delete (false)
            lv_scr_load_anim(page_ptr, anim, 150, 0, false);
          }

  - id: navigate_left
    then:
      - script.execute: haptic_pulse
      - if:
          condition:
            lambda: 'return id(active_popup_enum).current_option() != "none";'
          then:
            - script.execute:
                id: hide_popups
          else:
            - script.execute:
                id: navigate_to_animated
                direction: "LEFT"
                target: !lambda |-
                  const std::string& current = id(current_page_enum).current_option();
                  const std::vector<std::string>& pages = id(ui_pages); // Grab the global array

                  // Find current page index
                  auto it = std::find(pages.begin(), pages.end(), current);
                  int idx = (it != pages.end()) ? std::distance(pages.begin(), it) : 0;

                  // Move Left (Next) and wrap around
                  int next_idx = (idx + 1) % pages.size();
                  return pages[next_idx];

  - id: navigate_right
    then:
      - script.execute: haptic_pulse
      - if:
          condition:
            lambda: 'return id(active_popup_enum).current_option() != "none";'
          then:
            - script.execute:
                id: hide_popups
          else:
            - script.execute:
                id: navigate_to_animated
                direction: "RIGHT"
                target: !lambda |-
                  const std::string& current = id(current_page_enum).current_option();
                  const std::vector<std::string>& pages = id(ui_pages); // Grab the global array

                  // Find current page index
                  auto it = std::find(pages.begin(), pages.end(), current);
                  int idx = (it != pages.end()) ? std::distance(pages.begin(), it) : 0;

                  // Move Right (Previous) and wrap around
                  int prev_idx = (idx - 1 + pages.size()) % pages.size();
                  return pages[prev_idx];

  - id: show_media_controls_popup
    mode: restart
    parameters:
      direction: std::string
    then:
      - select.set:
          id: active_popup_enum
          option: "media_controls"
      - script.execute:
          id: internal_navigate_to_animated
          target: "media_controls"
          direction: !lambda 'return direction;'

  - id: hide_popups
    then:
      - script.execute:
          id: navigate_to_animated
          target: !lambda 'return id(current_page_enum).current_option();'
          direction: "DOWN"
