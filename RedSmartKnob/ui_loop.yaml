# The core UI loop and navigation
select:
  - platform: template
    id: current_page_enum
    internal: true
    optimistic: true
    options:
      - "time"
      - "media"
      - "settings"
    initial_option: "time"
    on_value:
      - text_sensor.template.publish:
          id: public_current_page
          state: !lambda 'return x;'

  - platform: template
    id: active_popup_enum
    internal: true
    optimistic: true
    options:
      - "none"
      - "media_controls"
    initial_option: "none"
    on_value:
      - text_sensor.template.publish:
          id: public_active_popup
          state: !lambda 'return x;'

text_sensor:
  # A read-only copy of the current_page_enum, published to HA.
  - platform: template
    id: public_current_page
    name: "Current Page"
    icon: "mdi:tablet-dashboard"
    entity_category: diagnostic

  - platform: template
    id: public_active_popup
    name: "Currently Active Popup"
    icon: "mdi:forum-outline"
    entity_category: diagnostic

script:    
  - id: api_connected
    then:
      - lvgl.widget.show: top_api_status_widget

  - id: api_disconnected
    then:
      - lvgl.widget.hide: top_api_status_widget

  - id: standby_screen_activity
    mode: restart
    then:
      - light.turn_on: back_light
      - delay: !lambda |-
          return (uint32_t) (id(screen_timeout_seconds).state * 1000.0f);
      - light.turn_off: back_light
      
  - id: screen_off
    then:
      - script.stop: standby_screen_activity
      - light.turn_off: back_light

  - id: reset_idle_timer
    mode: restart
    then:
      - script.execute: standby_screen_activity
      - delay: !lambda |-
          return (uint32_t) (id(idle_timeout_seconds).state * 1000.0f);
      # 1. First, hide any active popups
      - if:
          condition:
            lambda: 'return id(active_popup_enum).current_option() != "none";'
          then:
            - script.execute: hide_popups
            
      # 2. Then, check if we need to return to the default page
      - if:
          condition:
            lambda: |-
              // Compare current page to the HA select preference
              return id(current_page_enum).current_option() != id(idle_page_preference).current_option();
          then:
            - logger.log: "Idle timeout reached, reverting to default page."
            - script.execute:
                id: navigate_to
                target: !lambda 'return id(idle_page_preference).current_option();'

  - id: navigate_to
    parameters:
      target: std::string
    then:
      # 1. Update the global state
      - select.set:
          id: active_popup_enum
          option: "none"
      - select.set:
          id: current_page_enum
          option: !lambda 'return target.c_str();'
      
      # 2. Restart the idle timer since navigation implies user activity
      - script.execute: reset_idle_timer
      
      # 3. Route to the correct LVGL page
      - if:
          condition:
            lambda: 'return target == "time";'
          then:
            - lvgl.page.show:
                id: time_page
      - if:
          condition:
            lambda: 'return target == "media";'
          then:
            - lvgl.page.show:
                id: media_player_page
      - if:
          condition:
            lambda: 'return target == "settings";'
          then:
            - lvgl.page.show:
                id: settings_page
      # TODO: Add playlists, shortcuts, etc.

  - id: navigate_left
    then:
      - script.execute: haptic_pulse
      - if:
          condition:
            lambda: 'return id(active_popup_enum).current_option() != "none";'
          then:
            - script.execute:
                id: hide_popups
          else:
            - script.execute:
                id: navigate_to
                target: !lambda |-
                  if (id(current_page_enum).current_option() == "media") {
                    return "time";
                  } else if (id(current_page_enum).current_option() == "time") {
                    return "settings";
                  } else {
                    return "media";
                  }

  - id: navigate_right
    then:
      - script.execute: haptic_pulse
      - if:
          condition:
            lambda: 'return id(active_popup_enum).current_option() != "none";'
          then:
            - script.execute:
                id: hide_popups
          else:
            # TODO: Any way to do the 'lvgl.page.next: animation: MOVE_RIGHT time: 200ms' ?
            - script.execute:
                id: navigate_to
                target: !lambda |-
                  if (id(current_page_enum).current_option() == "media") {
                    return "settings";
                  } else if (id(current_page_enum).current_option() == "time") {
                    return "media";
                  } else {
                    return "time";
                  }

  - id: show_media_controls_popup
    mode: restart
    then:
      - select.set:
          id: active_popup_enum
          option: "media_controls"
      - script.execute: reset_idle_timer
      - lvgl.page.show:
          id: media_controls_page

  - id: hide_popups
    then:
      - script.execute:
          id: navigate_to
          target: !lambda 'return id(current_page_enum).current_option();'
