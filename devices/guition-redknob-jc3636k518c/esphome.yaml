# Guition 1.8" Rotary Knob, Guition JC3636K518C-I-YR1
# Also available as WaveShare ESP32-S3-Knob-Touch-LCD-1.8 (SKU 31623).
substitutions:
  name: "guition-redknob"
  friendly_name: "RedSmartKnob"
  comment: "Guition 1.8in Rotary Knob JC3636K518C-I-YR1"
  # Your weather entity in Home Assistant. You can configure it via HA.
  weather: weather.not_set_yet
  # Your indoor temperature entity in Home Assistant. You can configure it via HA.
  indoor_temp_entity: sensor.indoor_temp_not_set_yet
  # HomeAssistant base URI. This will be used when fetching non-sendspin album art.
  # Can be overridden in HA.
  homeassistant_base_uri: "http://homeassistant.local"
  # The UI theme to use.
  # Options include: blue, orange, green & white.
  theme: "blue"

  # Set to true if you want a local sendspin client, rather than controlling a remote mediaplayer.
  enable_sendspin: true
  # The media player entity to control. If using `enable_sendspin`, this should
  # refer to the Music Assistant version of the entity, not the device
  # directly.
  mediaplayer: media_player.office

  # Uncomment to pull images from the local deployment (vs github main)
  #repo_base_uri: "../../RedSmartKnob"

# Duplicated for the sake of ewt-gen
esphome:
  name: "${name}"

logger:
  level: DEBUG

# Uncomment this section to use credentials stored in secrets.yaml; otherwise,
# this is set up for webserial installs and improv.
#wifi:
#  ssid: !secret wifi_ssid
#  password: !secret wifi_password
#api:
#  encryption:
#    key: !secret api_encryption_key
#ota:
#  - platform: esphome
#    password: !secret ota_password

packages:
  # For local development, use:
  #setup: !include packages.yaml
  # Otherwise, this will pull it from GitHub:
  setup:
    url: https://github.com/magdalar/RedSmartKnob
    files: [devices/guition-redknob-jc3636k518c/packages.yaml]
    refresh: 0s  # always pull, comment out for caching
 
