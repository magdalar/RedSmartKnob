# Pin outs from: https://community.home-assistant.io/t/display-knob/905249/16
i2s_audio:
  - id: i2s_output_id
    i2s_lrclk_pin: GPIO40
    i2s_bclk_pin: GPIO39

speaker:
  - platform: i2s_audio
    id: i2s_audio_speaker
    i2s_dout_pin: GPIO41
    i2s_audio_id: i2s_output_id
    dac_type: external
    timeout: never
    buffer_duration: 100ms
    channel: stereo
