display:
  - platform: mipi_spi
    id: main_display
    model: JC3636W518V2
    transform:
      swap_xy: false
      mirror_x: true
      mirror_y: true
    update_interval: never
    dimensions:
        height: 360
        width: 360

binary_sensor:
  - platform: template
    name: "Touch Button"
    id: touch_input

# Touchscreen (CST816S)
touchscreen:
  - platform: cst816
    id: my_touchscreen
    display: main_display
    interrupt_pin: GPIO41
    reset_pin: GPIO40
    transform:
      mirror_x: true
      mirror_y: true
    on_touch:
      then:
        - logger.log:
            format: "Touch at (%d, %d)"
            args: [touch.x, touch.y]
        - binary_sensor.template.publish:
            id: touch_input
            state: ON
        - script.execute: reset_idle_timer
    on_release:
      then:
        - binary_sensor.template.publish:
            id: touch_input
            state: OFF

# SPI configuration for the display
spi:
  id: display_qspi
  type: quad
  clk_pin: GPIO9
  data_pins: [GPIO11, GPIO12, GPIO13, GPIO14]

# I2C for touch controller
i2c:
  id: touchscreen_bus
  sda: GPIO7
  scl: GPIO8

output:
  - platform: ledc
    id: backlight_pwm
    pin: GPIO15      # backlight GPIO
    inverted: false

light:
  - platform: monochromatic
    output: backlight_pwm
    name: "Display Backlight"
    icon: "mdi:television"
    entity_category: config
    id: back_light
    restore_mode: ALWAYS_ON
    default_transition_length:
      milliseconds: 30
    initial_state:
      brightness: 50%
    on_turn_off:
      then:
        - lvgl.pause:
            show_snow: true
    on_turn_on:
      then:
        - lvgl.resume:

lvgl:
  displays:
    - main_display
  touchscreens:
    - my_touchscreen
  #buffer_size: 12%
  #color_depth: 16

