substitutions:
  dev_has_battery: "false"

  ### These are not user-configurable.
  screenwidth: 360
  screenheight: 360

  microphone_id: microphone_id
  output_speaker_id: i2s_audio_speaker
  sample_rate_speaker: 48000
  task_stack_in_psram: True

packages:
  # Core device and chip configuration
  device: !include device.yaml
  # Speaker definition
  audio: !include audio.yaml
  # Touchscreen display initialization.
  display: !include display.yaml
  # TODO: Add the sd card if needed, otherwise just leave it out...
  #sd_card: !include sd_card.yaml
  
  app_main: !include ../../../RedSmartKnob/main.yaml

