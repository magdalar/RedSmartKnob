# Guition 1.8" Silver Puck, JC3636W518C_I_Y
substitutions:
  name: "guition-silverpuck"
  friendly_name: "SilverPuck"
  comment: "Guition 1.8in Silver Puck JC3636W518C_I_Y"

  # Set to true if you want a local sendspin client, rather than controlling a remote mediaplayer.
  enable_sendspin: true

  # Uncomment to pull images from the local deployment (vs github main)
  #repo_base_uri: "../../RedSmartKnob"

# Duplicated for the sake of ewt-gen
esphome:
  name: "${name}"

logger:
  level: INFO

# Uncomment this section to use credentials stored in secrets.yaml; otherwise,
# this is set up for webserial installs and improv.
#wifi:
#  ssid: !secret wifi_ssid
#  password: !secret wifi_password
#api:
#  encryption:
#    key: !secret api_encryption_key
#ota:
#  - platform: esphome
#    password: !secret ota_password

packages:
  # For local development, use:
  #setup: !include device/packages.yaml
  # Otherwise, this will pull it from GitHub:
  setup:
    url: https://github.com/magdalar/RedSmartKnob
    files: [devices/guition-silverpuck-jc3636w518c/device/packages.yaml]
    refresh: 0s  # always pull, comment out for caching
 
