name: Build and Publish Firmware

on:
  ## On push:
  #push:
  #  branches: [ "main", "master" ]
  ## On Release:
  #release:
  #  types: [published]
  # Nightly
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout Code
        # fetch-depth: 0 is required so git has the commit history to check
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for recent changes
        id: check_changes
        run: |
          # If it's cron, only run if there are commits in the last 24 hours.
          if [ "${{ github.event_name }}" == "schedule" ]; then
            if [ -n "$(git log --since='24 hours ago' --oneline)" ]; then
              echo "run_build=true" >> $GITHUB_OUTPUT
            else
              echo "run_build=false" >> $GITHUB_OUTPUT
            fi
          else
            # If it's a manual trigger, always run.
            echo "run_build=true" >> $GITHUB_OUTPUT
          fi

      # uv is an incredibly fast Python package manager
      - name: Setup uv
        if: steps.check_changes.outputs.run_build == 'true'
        uses: astral-sh/setup-uv@v5

      # Installing ESPHome locally stops ewt-gen from falling back to Docker,
      # which significantly speeds up the build process.
      - name: Install ESPHome
        if: steps.check_changes.outputs.run_build == 'true'
        run: uv tool install esphome

      - name: Generate Installer Site
        if: steps.check_changes.outputs.run_build == 'true'
        run: |
          # ewt-gen accepts a glob pattern, processes every matching YAML,
          # compiles them, and outputs a complete static site to the 'public' folder
          uvx ewt-gen devices/*/esphome.yaml --output public

      - name: Upload Pages artifact
        if: steps.check_changes.outputs.run_build == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        if: steps.check_changes.outputs.run_build == 'true'
        uses: actions/deploy-pages@v4
