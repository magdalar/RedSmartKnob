name: Build and Publish Firmware

on:
  ## On push:
  #push:
  #  branches: [ "main", "master" ]
  ## On Release:
  #release:
  #  types: [published]
  ## Nightly
  #schedule:
  #  - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
    steps:
      - name: Checkout Code
        # fetch-depth: 0 is required so git has the commit history to check
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      # uv is an incredibly fast Python package manager
      - id: setup-uv
        name: Setup uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: false

      # Installing ESPHome locally stops ewt-gen from falling back to Docker,
      # which significantly speeds up the build process.
      - name: Install ESPHome
        run: uv tool install esphome==2026.7.0

      - name: Compute firmware version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          commit_date="$(git show -s --format=%cs HEAD)"
          version="${commit_date//-/.}.${GITHUB_RUN_NUMBER}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Firmware version: $version"

      - name: Prepare configuration for CI
        run: ./scripts/prepare-ci.sh -f ${{ steps.version.outputs.version }}

      - name: Build the firmware
        run: |
          ./scripts/build-firmware.sh \
            -f "${{steps.version.outputs.version}}" \
            -p "${{steps.pages.outputs.base_url}}" \
            -o site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
