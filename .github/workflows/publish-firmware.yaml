name: Build and Publish Firmware

on:
  ## On push:
  #push:
  #  branches: [ "main", "master" ]
  ## On Release:
  #release:
  #  types: [published]
  ## Nightly
  #schedule:
  #  - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
    steps:
      - name: Checkout Code
        # fetch-depth: 0 is required so git has the commit history to check
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      # uv is an incredibly fast Python package manager
      - id: setup-uv
        name: Setup uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: false

      # Installing ESPHome locally stops ewt-gen from falling back to Docker,
      # which significantly speeds up the build process.
      - name: Install ESPHome
        run: uv tool install esphome==2026.7.0

      - name: Compute firmware version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          commit_date="$(git show -s --format=%cs HEAD)"
          version="${commit_date//-/.}.${GITHUB_RUN_NUMBER}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          sed -i "s/firmware_version: .*/firmware_version: \"$version\"/g" RedSmartKnob/esphome.yaml
          echo "Firmware version: $version"

      - name: Generate sites with ewt-gen
        shell: bash
        env:
          PAGES_BASE_URL: ${{ steps.pages.outputs.base_url }}
          FW_VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -uo pipefail
          shopt -s nullglob

          echo "Pages base URL: $PAGES_BASE_URL"
          echo "Firmware version: $FW_VERSION"

          configs=(devices/*/esphome.yaml)
          if [ ${#configs[@]} -eq 0 ]; then
            echo "No firmware config files found."
            exit 1
          fi

          echo "Found configs:"
          printf ' - %s\n' "${configs[@]}"

          mkdir -p site
          failed=0

          for config in "${configs[@]}"; do
            name="$(basename $(dirname "${config}"))"
            echo "::group::Generating page for $config"
            echo "Config: $config"
            echo "Output: site/$name"
            echo "Publish URL: ${PAGES_BASE_URL%/}/$name"

            # Point the includes to the local copy, rather than the github branch.
            sed -i \
              -e 's|^  setup:.*|  setup: !include device/packages.yaml|' \
              -e '/^    url:.*/d' \
              -e '/^    files:.*/d' \
              -e '/^    refresh:.*/d' \
               "${config}"

            if uvx ewt-gen==1.5.2 "$config" \
              -t "$name" \
              -o "site/$name" \
              --publish-url "${PAGES_BASE_URL%/}/$name" \
              --fw-version "$FW_VERSION"; then
              echo "OK: $config"
            else
              echo "::error::FAILED: $config"
              failed=1
            fi

            echo "::endgroup::"
          done

          {
            echo '<!doctype html>'
            echo '<html><head><meta charset="utf-8"><title>Firmware pages</title><meta name="viewport" content="width=device-width"><style>li { margin: 4px 0 }</style></head><body>'
            echo '<h1>Firmware pages</h1><ul>'
            for config in "${configs[@]}"; do
              name="$(basename $(dirname "${config}"))"
              echo "<li><a href=\"./$name/\">$name</a></li>"
            done
            echo '</ul></body></html>'
          } > site/index.html

          if [ "$failed" -ne 0 ]; then
            echo "One or more configs failed."
            exit 1
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
